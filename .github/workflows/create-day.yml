name: 📚 Create Learning Day

on:
  workflow_dispatch:
    inputs:
      day:
        description: "Day Number (1-71)"
        required: true
        type: number

      topic:
        description: "Lesson Topic"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-day:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📂 Generate Learning Day
        run: |
          python scripts/create_day.py \
            "${{ github.event.inputs.day }}" \
            "${{ github.event.inputs.topic }}"

      - name: 📝 Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "📚 Create Day ${{ github.event.inputs.day }} - ${{ github.event.inputs.topic }}"

      - name: 🚀 Push Changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
